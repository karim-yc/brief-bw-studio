name: Update briefs.json

on:
  repository_dispatch:
    types: [update-briefs]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Append new brief or rebuild
        run: |
          python3 << 'PYEOF'
          import json, os
          from datetime import datetime

          # Charger le fichier existant
          with open('api/briefs.json', 'r', encoding='utf-8') as f:
              payload = json.load(f)
          briefs = payload.get('briefs', [])

          # Récupérer le payload du dispatch Make (si disponible)
          client_payload = json.loads(os.environ.get('CLIENT_PAYLOAD', '{}'))

          if client_payload.get('briefId'):
              brief_id = client_payload['briefId']
              submitted_at = client_payload.get('submittedAt', '')
              
              # Vérifier si ce brief existe déjà (dedup briefId+submittedAt)
              exists = any(
                  b.get('briefId') == brief_id and b.get('submittedAt') == submitted_at
                  for b in briefs
              )
              
              if not exists:
                  briefs.append(client_payload)
                  print(f"✅ Nouveau brief ajouté : {brief_id}")
              else:
                  print(f"⏭ Brief {brief_id} déjà présent, skip")
          else:
              print("ℹ Dispatch sans payload — fichier conservé tel quel")

          # Trier par date décroissante
          briefs.sort(key=lambda b: b.get('submittedAt', ''), reverse=True)

          payload = {
              "ok": True,
              "count": len(briefs),
              "updatedAt": datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
              "source": "github-action",
              "briefs": briefs
          }

          with open('api/briefs.json', 'w', encoding='utf-8') as f:
              json.dump(payload, f, ensure_ascii=False, indent=2)

          print(f"📋 briefs.json : {len(briefs)} briefs")
          PYEOF
        env:
          CLIENT_PAYLOAD: ${{ toJson(github.event.client_payload) }}

      - name: Commit and push
        run: |
          git config user.email "bw-brief-bot@github.com"
          git config user.name "BW Brief Bot"
          git add api/briefs.json
          if git diff --cached --quiet; then
            echo "Pas de changement"
          else
            git commit -m "auto: add brief [skip ci]"
            git push
          fi
