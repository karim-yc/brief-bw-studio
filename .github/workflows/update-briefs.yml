name: Update briefs.json

on:
  # Déclenché par Make après chaque soumission de brief
  repository_dispatch:
    types: [update-briefs]
  # Aussi disponible en déclenchement manuel
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch briefs from Make API
        run: |
          # Make API lit le Sheet avec ses credentials OAuth, pas de CORS côté serveur
          RESPONSE=$(curl -s --max-time 30 -X POST \
            -H "Content-Type: text/plain" \
            -d "get_briefs" \
            "https://hook.eu1.make.com/j6fe7afcbfirw60oarvn3tndmqoah54b" 2>&1)
          echo "$RESPONSE" > /tmp/make_response.json
          echo "Réponse Make (début):"
          echo "$RESPONSE" | head -c 300

      - name: Parse and write briefs.json
        run: |
          python3 << 'PYEOF'
          import json, sys
          from datetime import datetime

          with open('/tmp/make_response.json') as f:
              raw = f.read().strip()

          briefs = []
          source = 'unknown'

          if raw and raw != 'Accepted' and not raw.startswith('<'):
              try:
                  data = json.loads(raw)

                  # Format A : Google Sheets API → {values: [[headers],[rows...]]}
                  if 'values' in data and isinstance(data.get('values'), list):
                      rows = data['values']
                      if len(rows) >= 2:
                          hdrs = [str(h) for h in rows[0]]
                          for row in rows[1:]:
                              obj = {hdrs[i]: str(row[i]) if i < len(row) else '' for i in range(len(hdrs))}
                              if obj.get('briefId','').strip():
                                  briefs.append(obj)
                          source = 'make-sheets-api'

                  # Format B : Apps Script → {briefs: [...]}
                  elif 'briefs' in data:
                      briefs = [b for b in data['briefs'] if b.get('briefId')]
                      source = 'apps-script'

              except json.JSONDecodeError as e:
                  print(f"JSON parse error: {e}")
          else:
              print(f"Réponse Make inutilisable: {repr(raw[:100])}")

          if briefs:
              payload = {
                  "ok": True,
                  "count": len(briefs),
                  "updatedAt": datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
                  "source": source,
                  "briefs": briefs
              }
              with open('api/briefs.json', 'w', encoding='utf-8') as f:
                  json.dump(payload, f, ensure_ascii=False, indent=2)
              print(f"✅ briefs.json mis à jour — {len(briefs)} briefs depuis {source}")
          else:
              print("⚠ Aucun brief reçu de Make — fichier existant conservé")
          PYEOF

      - name: Commit and push
        run: |
          git config user.email "bw-brief-bot@github.com"
          git config user.name "BW Brief Bot"
          git add api/briefs.json
          if git diff --cached --quiet; then
            echo "Pas de changement à committer"
          else
            git commit -m "auto: update briefs.json [skip ci]"
            git push
          fi
